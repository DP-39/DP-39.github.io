<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="项目展示 - DevLog个人技术博客，展示个人项目和课程作品">
  <title>项目展示 - DevLog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 导航栏占位 -->
  <header id="site-nav" class="site-nav"></header>

  <main class="projects-page">
    <div class="container">
      <div class="section-header reveal">
        <h1 class="section-title">💻 项目展示</h1>
        <p class="section-subtitle">个人项目与课程作品，在实践中学习和成长</p>
      </div>

      <!-- 项目网格 -->
      <div class="projects-grid" id="projects-grid">
        <!-- 由JS动态渲染 -->
      </div>
    </div>
  </main>

  <!-- 页脚占位 -->
  <footer id="site-footer" class="site-footer"></footer>

  <!-- 脚本 -->
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function() {
      document.addEventListener('DOMContentLoaded', function() {
        const grid = document.getElementById('projects-grid');
        if (!grid) return;

        grid.innerHTML = projects.map((proj, i) => `
          <article class="project-card reveal" style="animation-delay:${i * 0.08}s;">
            <div class="project-cover">
              <object data="${proj.cover}" type="image/svg+xml" style="width:100%;height:100%;" aria-label="${proj.name}封面图">
                <img src="${proj.cover}" alt="${proj.name}" style="width:100%;height:100%;object-fit:cover;"
                  onerror="this.parentElement.innerHTML='<span style=font-size:3rem;>📁</span>'">
              </object>
            </div>
            <div class="project-info">
              <h3 class="project-name">${proj.name}</h3>
              <p class="project-desc">${proj.description}</p>
              <div class="project-tech">
                ${proj.tech.map(t => `<span class="tag">${t}</span>`).join('')}
              </div>
            </div>
          </article>
        `).join('');

        // 触发滚动动画
        setTimeout(initReveal, 100);
      });

      function initReveal() {
        const elements = document.querySelectorAll('.reveal');
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
        elements.forEach(el => observer.observe(el));
      }
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="页面未找到 - DevLog">
  <title>404 页面未找到 - DevLog</title>
  <link rel="stylesheet" href="css/style.css">
</head>

  <main class="error-page">

      <div class="error-code">404</div>

      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <a href="index.html" class="btn btn-primary">🏠 回到首页</a>
        <a href="blog.html" class="btn btn-outline">📝 浏览博客</a>
      </div>
      <p style="margin-top:32px;color:var(--text-muted);font-size:0.85rem;">
        状态码：404 Not Found
      </p>
    </div>
  </main>

  <!-- 页脚占位 -->
  <footer id="site-footer" class="site-footer"></footer>

  <!-- 脚本 -->
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>

</html>

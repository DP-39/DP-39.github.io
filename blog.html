<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DevLog博客列表 - 浏览所有技术文章，支持分类筛选、关键词搜索和日期排序">
  <title>博客列表 - DevLog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 导航栏占位 -->
  <header id="site-nav" class="site-nav"></header>

  <main class="blog-page">
    <div class="container">
      <!-- 页面标题 -->
      <div class="section-header reveal">
        <h1 class="section-title">📝 博客文章</h1>
        <p class="section-subtitle">共 <span id="post-count">0</span> 篇文章 · 持续更新中</p>
      </div>

      <!-- 工具栏：分类筛选 / 搜索 / 排序 -->
      <div class="blog-toolbar reveal">
        <div class="filter-tags">
          <span class="filter-label">分类：</span>
          <div class="filter-tags" id="filter-tags" data-active="全部">
            <!-- 由JS动态渲染 -->
          </div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="blog-search" placeholder="搜索文章标题或摘要...">
          </div>
          <button class="sort-btn" id="sort-btn" data-order="desc">
            ↓ 最新优先
          </button>
        </div>
      </div>

      <!-- 文章列表 -->
      <div class="blog-grid" id="blog-grid">
        <!-- 由JS动态渲染 -->
      </div>
    </div>
  </main>

  <!-- 页脚占位 -->
  <footer id="site-footer" class="site-footer"></footer>

  <!-- 脚本 -->
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/blog.js"></script>
  <script>
    // 更新文章计数
    document.addEventListener('DOMContentLoaded', () => {
      const countEl = document.getElementById('post-count');
      if (countEl) countEl.textContent = blogPosts.length;
    });
  </script>
</body>
</html>
